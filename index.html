<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Pernikahan</title>

<style>

body{

margin:0;

font-family:Arial;

background:linear-gradient(135deg,#0f172a,#1e293b);

color:white;

text-align:center;

}

.card{

background:rgba(255,255,255,0.08);

margin:20px auto;

padding:20px;

border-radius:15px;

max-width:500px;

backdrop-filter:blur(10px);

}

h1{color:#fbbf24}

.countdown{

color:#38bdf8;

font-size:18px;

margin-top:10px;

}

button{

padding:10px 15px;

border:none;

border-radius:20px;

background:#fbbf24;

font-weight:bold;

cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

<h2>Undangan Pernikahan</h2>

<h1>Sodik & Helmalia</h1>

</div>

<div class="card">

<p>Kepada Yth.</p>

<h3 id="nama">Tamu Undangan</h3>

</div>

<div class="card">

<p>Akad Nikah</p>

<p>1 Juni 2026 - 11.00 WIB</p>

<div class="countdown" id="countdown"></div>

</div>

<div class="card">

<p>Kediaman Mempelai Wanita</p>

<button>Buka Maps</button>

</div>

<script>

// nama tamu

const url = new URLSearchParams(window.location.search);

document.getElementById("nama").innerText =

url.get("to") || "Tamu Undangan";

// countdown

const target = new Date("June 1, 2026 11:00:00").getTime();

setInterval(()=>{

const now = new Date().getTime();

const d = target - now;

const days = Math.floor(d/(1000*60*60*24));

document.getElementById("countdown").innerText =

days + " hari lagi";

},1000);

</script>

</body>

</html
